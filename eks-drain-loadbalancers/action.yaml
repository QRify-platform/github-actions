name: Drain EKS LoadBalancers
description: >
  Prepare an EKS cluster for terraform destroy by removing LoadBalancer Services
  and waiting for classic/ELB ENIs to detach (avoids DetachInternetGateway hangs).

inputs:
  aws-region:
    description: AWS region of the cluster
    required: true
    default: us-east-2
  cluster-name:
    description: EKS cluster name
    required: true
    default: qrify-eks
  aws-role-to-assume:
    description: IAM role ARN to assume. Leave empty if AWS credentials are already configured.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure kubectl for EKS
      uses: QRify-platform/github-actions/eks-kubeconfig@main
      with:
        aws-role-to-assume: ${{ inputs.aws-role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
        cluster-name: ${{ inputs.cluster-name }}

    - name: Drain LoadBalancer services
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        set -euo pipefail
        chmod +x "${{ github.action_path }}/drain.sh"
        "${{ github.action_path }}/drain.sh"
