name: ECR retag
description: Copy an existing ECR image tag from one repository to another (no rebuild).

inputs:
  source-image-name:
    description: Source ECR repository name (e.g. qrify-web-dev)
    required: true
  target-image-name:
    description: Target ECR repository name (e.g. qrify-web-prod)
    required: true
  image-tag:
    description: Image tag to copy (usually short SHA)
    required: true
  aws-role-to-assume:
    description: IAM role ARN to assume
    required: true
  aws-region:
    description: AWS region
    required: true
  ecr-registry:
    description: ECR registry URI
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Log in to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Retag and push
      shell: bash
      env:
        ECR_REGISTRY: ${{ inputs.ecr-registry }}
        SRC: ${{ inputs.source-image-name }}
        DST: ${{ inputs.target-image-name }}
        TAG: ${{ inputs.image-tag }}
      run: |
        set -euo pipefail
        SOURCE="${ECR_REGISTRY}/${SRC}:${TAG}"
        TARGET="${ECR_REGISTRY}/${DST}:${TAG}"
        echo "Promoting ${SOURCE} → ${TARGET}"
        docker pull "${SOURCE}"
        docker tag "${SOURCE}" "${TARGET}"
        docker push "${TARGET}"
