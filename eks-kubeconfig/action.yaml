name: EKS kubeconfig
description: Install kubectl and point it at a QRify EKS cluster (optionally configure AWS OIDC first).

inputs:
  aws-region:
    description: AWS region of the cluster
    required: true
    default: us-east-2
  cluster-name:
    description: EKS cluster name
    required: true
    default: qrify-eks
  aws-role-to-assume:
    description: IAM role ARN to assume. Leave empty if AWS credentials are already configured in the job.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure AWS credentials from OIDC
      if: ${{ inputs.aws-role-to-assume != '' }}
      uses: QRify-platform/github-actions/aws-oidc@main
      with:
        aws-role-to-assume: ${{ inputs.aws-role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Update kubeconfig
      shell: bash
      run: |
        set -euo pipefail
        aws eks update-kubeconfig \
          --region "${{ inputs.aws-region }}" \
          --name "${{ inputs.cluster-name }}"
