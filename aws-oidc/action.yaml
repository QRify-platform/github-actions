name: Configure AWS via OIDC
description: Assume an AWS IAM role using GitHub Actions OIDC (no long-lived keys).

inputs:
  aws-role-to-assume:
    description: IAM role ARN to assume
    required: true
  aws-region:
    description: AWS region
    required: true
    default: us-east-2

runs:
  using: composite
  steps:
    - name: Require role ARN
      shell: bash
      env:
        ROLE: ${{ inputs.aws-role-to-assume }}
      run: |
        set -euo pipefail
        if [ -z "${ROLE}" ]; then
          echo "::error::aws-role-to-assume is empty. On free GitHub orgs, org vars do not apply to private repos — set a repo variable or pass the ARN literally."
          exit 1
        fi
        echo "Assuming role: ${ROLE}"

    - name: Configure AWS credentials from OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
